<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Imbue:opsz,wght@10..100,100..900&family=McLaren&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    <title>Intramurals Team Checker</title>

    <Style>
        body{
            background-color:#d8e1e8;
            font-family:Georgia, serif;
            color:#304674;
            display:flex;
            justify-content:center;
            align-items:center;
            height:777px;
            text-align: center;
        }

        form{
            background-color:#c6d3e3;
            padding:37px;
            border-radius:27px;
            width:577px;
            box-shadow: 0 17px 27px #304674;
        }

        h4{
            font-size:17px;
            margin-top:17px;
        }

        input[type="radio"]{
            margin-left:7px;
            margin-right:7px;
        }

        select{
            width:377px;
            padding:7px;
            margin-top:7px;
            margin-bottom:17px;

            border-radius:17px;
            border:1px solid #98bad5;
            background-color:#b2cbde;
            color:#304674;
        }

        button{
            width:377px;
            padding:7px;
            background-color:#304674;
            color:#d8e1e8;
            border-radius:17px;
        }
    </Style>

</head>
<body>

    <br>
    <br>
    <div>
        <form>
            <h2>Intramurals Team Checker</h2>

                <p>___________________________</p>
                <h4>Are you done with the online registration?</h4>
                    <input type="radio" name="onreg" value="Yes"> Yes
                    <input type="radio" name="onreg" value="No"> No

                <h4>Do you have medical clearance?</h4>
                    <input type="radio" name="medclear" value="Yes"> Yes
                    <input type="radio" name="medclear" value="No"> No
                
                <p>________________________________________________</p>
                <h4>Grade and Section</h4>
                    <select name="grade">
                        <option value="7">Grade 7</option>
                        <option value="8">Grade 8</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                    </select>

                    <select name="section">
                        <option value="Emerald">Emerald</option>
                        <option value="Ruby">Ruby</option>
                    </select>
                <br>
                <br>
                <br>
                <p>☘︎☘︎☘︎</p>
            <button type="submit">Sign Up</button>
        </form>
    </div>

    <script type="py-script" src="main.py"></script>

</body>
</html>
